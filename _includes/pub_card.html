{%- assign p = include.p -%}
<div class="paper-card">
<div class="paper-badge" style="background-color: {{ p.color }};">{{ p.badge }}</div>
<div class="paper-content">
<p><span class="pub-title">{{ p.title }}</span><br>
{{ p.authors }}<br>
<span class="pub-venue">{{ p.venue }}</span><br>
<span class="pub-tags"><strong>{{ p.role }}</strong>{% if p.tags and p.tags != "" %} &middot; <span class="pub-rank">{{ p.tags }}</span>{% endif %}</span></p>
<p><button class="abs-btn">Abstract</button> <a class="link-btn" href="{{ p.link }}" target="_blank">Paper</a></p>
<div class="abstract hidden">{{ p.abstract }}</div>
</div>
</div>
